{% extends "base.html" %}
{% block content %}

<h2 class="mb-3">Packet Capture Overview</h2>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Source</th>
            <th>Destination</th>
            <th>Protocol</th>
            <th>Info</th>
        </tr>
    </thead>

    <tbody>
    {% for p in packets %}
        <tr>
            <td>{{ p.src }}</td>
            <td>{{ p.dst }}</td>
            <td>{{ p.protocol }}</td>
            <td>{{ p.info }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>

<div class="mt-3">
    <a class="btn btn-success" href="{{ url_for('start_capture') }}">Start Capture</a>
    <a class="btn btn-danger" href="{{ url_for('stop_capture') }}">Stop Capture</a>
</div>

{% endblock %}
